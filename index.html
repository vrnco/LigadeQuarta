<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa dos Médicos — Beach Tennis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sand: #F5E6C8;
    --ocean: #1A6B8A;
    --ocean-light: #2A8BAF;
    --ocean-dark: #0D4A63;
    --court: #4A9B6F;
    --court-light: #5BBF87;
    --gold: #D4A017;
    --gold-light: #F0C040;
    --silver: #8A9BB0;
    --bg-primary: #0F2A3A;
    --bg-secondary: #132E40;
    --bg-card: #1A3A50;
    --bg-card-hover: #1E4560;
    --border: rgba(255,255,255,0.08);
    --border-accent: rgba(212,160,23,0.3);
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-primary);
    color: #EAF0F6;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--bg-secondary) 100%);
    border-bottom: 1px solid var(--border-accent);
    padding: 0 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px;
    padding: 12px 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 42px; height: 42px; background: var(--gold);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .logo-title { font-size: 16px; font-weight: 700; color: var(--gold-light); letter-spacing: .5px; line-height: 1.2; }
  .logo-sub { font-size: 11px; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: 1px; }
  .header-nav { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
  .nav-btn {
    padding: 7px 14px; background: transparent;
    border: 1px solid transparent; border-radius: 8px;
    color: rgba(255,255,255,.55); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all .2s; white-space: nowrap;
  }
  .nav-btn:hover { background: rgba(255,255,255,.05); color: #fff; }
  .nav-btn.active { background: rgba(212,160,23,.15); border-color: var(--border-accent); color: var(--gold-light); }

  /* ── MAIN ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── SEASON BAR ── */
  .season-bar {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .season-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.4); }
  .season-select {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 6px; color: #fff; padding: 4px 10px; font-size: 13px;
  }
  .liga-badge {
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
  }
  .liga-1 { background: rgba(212,160,23,.15); color: var(--gold-light); border: 1px solid rgba(212,160,23,.3); }
  .liga-2 { background: rgba(42,139,175,.15); color: #7CC8E8; border: 1px solid rgba(42,139,175,.3); }
  .liga-3 { background: rgba(74,155,111,.15); color: #7DD4A8; border: 1px solid rgba(74,155,111,.3); }
  .churrasco-badge { background: rgba(220,80,30,.15); color: #F09070; border: 1px solid rgba(220,80,30,.3); }

  /* ── CARDS ── */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: rgba(255,255,255,.4); margin-bottom: 14px; }

  /* ── RANKING ── */
  .ranking-grid { display: grid; gap: 10px; }
  .rank-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: all .2s; cursor: pointer;
  }
  .rank-card:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,.15); }
  .rank-card.gold-border   { border-color: var(--gold); }
  .rank-card.silver-border { border-color: var(--silver); }
  .rank-card.bronze-border { border-color: #CD7F32; }
  .rank-pos { font-size: 20px; font-weight: 800; width: 36px; text-align: center; flex-shrink: 0; }
  .pos-1 { color: var(--gold-light); }
  .pos-2 { color: #C8D8E8; }
  .pos-3 { color: #CD7F32; }
  .pos-other { color: rgba(255,255,255,.3); }

  .avatar-placeholder {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; flex-shrink: 0; border: 2px solid rgba(255,255,255,.1);
  }
  .athlete-avatar { border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(255,255,255,.1); }

  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 15px; font-weight: 600; }
  .rank-nick { font-size: 12px; color: rgba(255,255,255,.4); }
  .rank-stats { display: flex; gap: 16px; align-items: center; }
  .stat-item { text-align: center; }
  .stat-val { font-size: 16px; font-weight: 700; }
  .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,.35); }
  .pts-badge {
    background: rgba(212,160,23,.2); border: 1px solid rgba(212,160,23,.4);
    border-radius: 8px; padding: 6px 12px; text-align: center; min-width: 60px;
  }
  .pts-val { font-size: 18px; font-weight: 800; color: var(--gold-light); }
  .pts-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: rgba(212,160,23,.6); }

  /* ── GRID ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

  /* ── METRIC CARDS ── */
  .metric-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .metric-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: rgba(255,255,255,.35); margin-bottom: 6px; }
  .metric-val { font-size: 28px; font-weight: 800; }
  .metric-sub { font-size: 12px; color: rgba(255,255,255,.4); margin-top: 2px; }
  .metric-gold  .metric-val { color: var(--gold-light); }
  .metric-ocean .metric-val { color: #7CC8E8; }
  .metric-green .metric-val { color: #7DD4A8; }

  /* ── BUTTONS ── */
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
  .btn-primary { background: var(--ocean); color: #fff; }
  .btn-primary:hover { background: var(--ocean-light); }
  .btn-gold { background: var(--gold); color: #1A2332; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: rgba(255,255,255,.7); }
  .btn-outline:hover { background: rgba(255,255,255,.05); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: rgba(192,57,43,.2); border: 1px solid rgba(192,57,43,.4); color: #F08080; }
  .btn-danger:hover { background: rgba(192,57,43,.35); }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: rgba(255,255,255,.45); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .form-input, .form-select {
    width: 100%; background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 8px; color: #fff; padding: 8px 12px; font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--ocean-light); }
  .form-input::placeholder { color: rgba(255,255,255,.2); }
  .form-select option { background: #1A3A50; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.72);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px;
    width: 90%; max-width: 600px; max-height: 88vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--gold-light); }
  .modal-footer {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  }

  /* ── PROFILE ── */
  .profile-hero {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--ocean-dark) 100%);
    border: 1px solid var(--border-accent); border-radius: var(--radius-lg);
    padding: 24px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .profile-name { font-size: 24px; font-weight: 800; }
  .profile-nick { font-size: 16px; color: var(--gold-light); font-style: italic; }
  .profile-meta { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
  .profile-meta-item { font-size: 12px; color: rgba(255,255,255,.4); }
  .profile-meta-item span { color: rgba(255,255,255,.7); }
  .wl-bar { height: 8px; border-radius: 4px; background: rgba(255,255,255,.08); overflow: hidden; margin: 6px 0; }
  .wl-fill { height: 100%; background: var(--court-light); border-radius: 4px; transition: width .5s; }

  /* ── CONFRONTO ── */
  .confronto-vs { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .confronto-side { flex: 1; min-width: 120px; }
  .confronto-resultado { font-size: 32px; font-weight: 900; text-align: center; }
  .result-win  { color: var(--court-light); }
  .result-loss { color: #F08080; }

  /* ── HISTÓRICO ── */
  .champion-card {
    background: linear-gradient(135deg, rgba(212,160,23,.15) 0%, rgba(212,160,23,.05) 100%);
    border: 1px solid rgba(212,160,23,.4); border-radius: var(--radius-lg);
    padding: 20px; text-align: center; position: relative; overflow: hidden;
  }
  .champion-card::before { content:'🏆'; position:absolute; top:-10px; right:-10px; font-size:60px; opacity:.08; }

  /* ── FINALS ── */
  .serie-card { border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
  .serie-ouro  { background: linear-gradient(135deg,rgba(212,160,23,.12),rgba(212,160,23,.04)); border: 1px solid rgba(212,160,23,.3); }
  .serie-prata { background: linear-gradient(135deg,rgba(138,155,176,.12),rgba(138,155,176,.04)); border: 1px solid rgba(138,155,176,.3); }
  .serie-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
  .serie-title-ouro  { color: var(--gold-light); }
  .serie-title-prata { color: #C8D8E8; }

  /* ── MISC ── */
  .match-row {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-gold   { background: rgba(212,160,23,.2);  color: var(--gold-light); }
  .badge-silver { background: rgba(138,155,176,.2); color: #C8D8E8; }
  .badge-green  { background: rgba(74,155,111,.2);  color: #7DD4A8; }
  .badge-red    { background: rgba(192,57,43,.2);   color: #F08080; }
  .badge-blue   { background: rgba(42,139,175,.2);  color: #7CC8E8; }

  .search-box {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 8px; color: #fff; padding: 8px 14px; font-size: 14px;
    outline: none; width: 100%; transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--ocean-light); }

  .tag { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; font-size:11px; background:rgba(255,255,255,.06); color:rgba(255,255,255,.5); border:1px solid var(--border); }
  .flex-row { display:flex; align-items:center; gap:12px; }
  .flex-row.between { justify-content:space-between; }
  .mb-8  { margin-bottom:8px;  }
  .mb-16 { margin-bottom:16px; }
  .mt-8  { margin-top:8px;    }
  .mt-16 { margin-top:16px;   }
  .divider { height:1px; background:var(--border); margin:16px 0; }

  .empty-state { text-align:center; padding:40px 20px; color:rgba(255,255,255,.25); }
  .empty-icon  { font-size:48px; margin-bottom:12px; }
  .empty-text  { font-size:16px; line-height:1.6; }

  select, input { color-scheme: dark; }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }

  @media (max-width:720px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns:1fr; }
    .rank-stats { display:none; }
    .nav-btn { padding:6px 8px; font-size:12px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════ HEADER ═══════════════════ -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎾</div>
      <div>
        <div class="logo-title">CASA DOS MÉDICOS</div>
        <div class="logo-sub">Beach Tennis · Liga de Quarta</div>
      </div>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" onclick="showPage('ranking',this)">🏆 Ranking</button>
      <button class="nav-btn" onclick="showPage('jogos',this)">🎮 Jogos</button>
      <button class="nav-btn" onclick="showPage('atletas',this)">👤 Atletas</button>
      <button class="nav-btn" onclick="showPage('confrontos',this)">⚔️ Confrontos</button>
      <button class="nav-btn" onclick="showPage('finals',this)">🥇 Finals</button>
      <button class="nav-btn" onclick="showPage('historico',this)">📅 Histórico</button>
    </nav>
  </div>
</div>

<div class="main">

<!-- ═══════════════════ RANKING ═══════════════════ -->
<div id="page-ranking" class="page active">
  <div class="season-bar">
    <span class="season-label">Temporada</span>
    <select class="season-select" id="seasonSelect" onchange="updateSeason()"></select>
    <span id="currentLigaBadge" class="liga-badge liga-1">Liga 1</span>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-outline btn-sm" onclick="showModal('addResultModal')">+ Resultado</button>
      <button class="btn btn-gold btn-sm" onclick="showModal('addAtletaModal')">+ Atleta</button>
    </div>
  </div>
  <div class="grid-4 mb-16" id="rankingMetrics"></div>
  <div class="grid-2">
    <div>
      <div class="card-title" style="color:rgba(255,255,255,.4);font-size:12px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;">🏅 Classificação Geral</div>
      <div id="rankingList" class="ranking-grid"></div>
    </div>
    <div>
      <div class="card-title" style="color:rgba(255,255,255,.4);font-size:12px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;">📋 Últimos Resultados</div>
      <div id="recentGames"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════ JOGOS ═══════════════════ -->
<div id="page-jogos" class="page">
  <div class="season-bar">
    <span class="season-label">Liga</span>
    <select class="form-select" id="jogosLiga" style="width:auto;" onchange="renderJogos()">
      <option value="1">Liga 1 (Jan–Abr)</option>
      <option value="2">Liga 2 (Mai–Ago)</option>
      <option value="3">Liga 3 (Set–Dez)</option>
    </select>
    <button class="btn btn-gold btn-sm" onclick="showModal('novaRodadaModal')" style="margin-left:auto;">+ Nova Rodada</button>
  </div>
  <div id="jogosContent"></div>
</div>

<!-- ═══════════════════ ATLETAS ═══════════════════ -->
<div id="page-atletas" class="page">
  <div class="flex-row between mb-16">
    <input class="search-box" type="text" placeholder="Buscar atleta…" oninput="renderAtletas(this.value)" style="max-width:300px;">
    <button class="btn btn-gold" onclick="showModal('addAtletaModal')">+ Novo Atleta</button>
  </div>
  <div id="atletasList"></div>
</div>

<!-- ═══════════════════ CONFRONTOS ═══════════════════ -->
<div id="page-confrontos" class="page">
  <div class="card mb-16">
    <div class="card-title">⚔️ Head to Head</div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Atleta 1</label>
        <select class="form-select" id="confA" onchange="renderConfrontos()"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Atleta 2</label>
        <select class="form-select" id="confB" onchange="renderConfrontos()"></select>
      </div>
    </div>
  </div>
  <div id="confrontoResult"></div>
</div>

<!-- ═══════════════════ FINALS ═══════════════════ -->
<div id="page-finals" class="page">
  <div class="season-bar">
    <span class="season-label">Temporada</span>
    <select class="season-select" id="finalsSeason" onchange="renderFinals()"></select>
  </div>
  <div id="finalsContent"></div>
</div>

<!-- ═══════════════════ HISTÓRICO ═══════════════════ -->
<div id="page-historico" class="page">
  <div class="season-bar">
    <span class="season-label">Ano</span>
    <select class="season-select" id="histYear" onchange="renderHistorico()"></select>
  </div>
  <div id="historicoContent"></div>
</div>

</div><!-- /.main -->

<!-- ═══════════════════ MODALS ═══════════════════ -->

<!-- ADD ATLETA -->
<div id="addAtletaModal" class="modal-overlay" style="display:none;" onclick="outsideClose(event,'addAtletaModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">👤 Cadastrar Atleta</div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Nome Completo *</label><input type="text" class="form-input" id="aNome" placeholder="João Silva"></div>
      <div class="form-group"><label class="form-label">Apelido</label><input type="text" class="form-input" id="aApelido" placeholder="Jão"></div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Camiseta</label>
        <select class="form-select" id="aCamiseta">
          <option>PP</option><option>P</option><option selected>M</option><option>G</option><option>GG</option><option>XGG</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">URL Foto (opcional)</label><input type="text" class="form-input" id="aFoto" placeholder="https://…"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Cor do Avatar</label>
      <select class="form-select" id="aColor">
        <option value="ocean">Azul</option><option value="court">Verde</option>
        <option value="gold">Dourado</option><option value="coral">Coral</option><option value="purple">Roxo</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addAtletaModal')">Cancelar</button>
      <button class="btn btn-gold" onclick="saveAtleta()">Salvar</button>
    </div>
  </div>
</div>

<!-- EDIT ATLETA -->
<div id="editAtletaModal" class="modal-overlay" style="display:none;" onclick="outsideClose(event,'editAtletaModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">✏️ Editar Atleta</div>
    <input type="hidden" id="editId">
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Nome Completo *</label><input type="text" class="form-input" id="editNome"></div>
      <div class="form-group"><label class="form-label">Apelido</label><input type="text" class="form-input" id="editApelido"></div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Camiseta</label>
        <select class="form-select" id="editCamiseta">
          <option>PP</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>XGG</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">URL Foto</label><input type="text" class="form-input" id="editFoto"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Cor do Avatar</label>
      <select class="form-select" id="editColor">
        <option value="ocean">Azul</option><option value="court">Verde</option>
        <option value="gold">Dourado</option><option value="coral">Coral</option><option value="purple">Roxo</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editAtletaModal')">Cancelar</button>
      <button class="btn btn-danger btn-sm" onclick="deleteAtleta()">🗑 Excluir</button>
      <button class="btn btn-gold" onclick="updateAtleta()">Salvar</button>
    </div>
  </div>
</div>

<!-- ADD RESULT -->
<div id="addResultModal" class="modal-overlay" style="display:none;" onclick="outsideClose(event,'addResultModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">🎾 Registrar Resultado</div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Data</label><input type="date" class="form-input" id="rData"></div>
      <div class="form-group">
        <label class="form-label">Liga</label>
        <select class="form-select" id="rLiga">
          <option value="1">Liga 1</option><option value="2">Liga 2</option>
          <option value="3">Liga 3</option><option value="churrasco">🔥 Churrasco</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Resultado</label>
      <select class="form-select" id="rTipo">
        <option value="campeao">🥇 Campeão (10 pts)</option>
        <option value="vice">🥈 Vice-campeão (7 pts)</option>
        <option value="semi">🥉 Semifinalista (5 pts)</option>
        <option value="presenca">✅ Presença (1 pt)</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Atleta 1</label><select class="form-select" id="rAtleta1"></select></div>
    <div class="form-group"><label class="form-label">Atleta 2 (dupla)</label><select class="form-select" id="rAtleta2"></select></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addResultModal')">Cancelar</button>
      <button class="btn btn-gold" onclick="saveResult()">Registrar</button>
    </div>
  </div>
</div>

<!-- NOVA RODADA -->
<div id="novaRodadaModal" class="modal-overlay" style="display:none;" onclick="outsideClose(event,'novaRodadaModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">📋 Nova Rodada — Sorteio de Duplas</div>
    <div class="grid-2">
      <div class="form-group"><label class="form-label">Data *</label><input type="date" class="form-input" id="rodData"></div>
      <div class="form-group">
        <label class="form-label">Dia de Churrasco? 🔥</label>
        <select class="form-select" id="rodChurrasco"><option value="0">Não</option><option value="1">Sim</option></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Participantes</label>
      <div id="rodPart" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:220px;overflow-y:auto;padding:6px;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,.2);"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('novaRodadaModal')">Cancelar</button>
      <button class="btn btn-gold" onclick="saveRodada()">Criar & Sortear Duplas</button>
    </div>
  </div>
</div>

<!-- PROFILE -->
<div id="profileModal" class="modal-overlay" style="display:none;" onclick="outsideClose(event,'profileModal')">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:700px;">
    <div id="profileContent"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('profileModal')">Fechar</button>
      <button class="btn btn-primary btn-sm" onclick="openEditFromProfile()">✏️ Editar</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DATA STORE
═══════════════════════════════════════════════ */
const KEY = 'casaMedicos_v4';

function load() {
  try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { atletas:[], resultados:[], rodadas:[], currentSeason: String(new Date().getFullYear()) };
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {} }

let S = load();

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const PTS = { campeao:10, vice:7, semi:5, presenca:1 };
const COLORS = {
  ocean:  { bg:'#0D3A50', fg:'#7CC8E8' },
  court:  { bg:'#1A4030', fg:'#7DD4A8' },
  gold:   { bg:'#5A3A08', fg:'#F0C040' },
  coral:  { bg:'#5A1818', fg:'#F09070' },
  purple: { bg:'#3A1A5A', fg:'#C09AEF' }
};

function atletaById(id) { return S.atletas.find(a => a.id === id); }

function avatar(a, sz=44, extraStyle='') {
  const c = COLORS[a.color || 'ocean'];
  const ini = (() => { const p = (a.nome||'').split(' '); return p.length>=2 ? p[0][0]+p[1][0] : (a.nome||'??').slice(0,2).toUpperCase(); })();
  const base = `width:${sz}px;height:${sz}px;${extraStyle}`;
  const ph = `<div class="avatar-placeholder" style="${base};background:${c.bg};color:${c.fg};font-size:${Math.round(sz*.34)}px;">${ini}</div>`;
  if (!a.foto) return ph;
  return `<img src="${a.foto}" class="athlete-avatar" style="${base}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar-placeholder',innerHTML:'${ini}',style:'${base};background:${c.bg};color:${c.fg};font-size:${Math.round(sz*.34)}px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;border-radius:50%;border:2px solid rgba(255,255,255,.1)'}))">`;
}

function ranking(season) {
  const m = {};
  S.atletas.forEach(a => { m[a.id] = {a, pts:0, campeoes:0, vices:0, semis:0, presencas:0, jogos:0, vitorias:0, derrotas:0}; });
  S.resultados.filter(r => !season || r.season===season).forEach(r => {
    r.atletaIds.forEach(id => {
      if (!m[id]) return;
      m[id].pts += PTS[r.tipo]||0;
      if (r.tipo==='campeao')  { m[id].campeoes++; m[id].vitorias++; }
      else if (r.tipo==='vice') { m[id].vices++; m[id].derrotas++; }
      else if (r.tipo==='semi') { m[id].semis++; m[id].derrotas++; }
      else if (r.tipo==='presenca') m[id].presencas++;
      m[id].jogos++;
    });
  });
  return Object.values(m).sort((a,b) => b.pts-a.pts || b.campeoes-a.campeoes || b.vices-a.vices || b.semis-a.semis);
}

function seasons() {
  const y = new Set([String(new Date().getFullYear()), String(new Date().getFullYear()-1)]);
  S.resultados.forEach(r => r.season && y.add(r.season));
  S.rodadas.forEach(r => r.season && y.add(r.season));
  return [...y].sort((a,b)=>b-a);
}

function fillSeasonSelects() {
  const opts = seasons().map(s=>`<option value="${s}">${s}</option>`).join('');
  ['seasonSelect','finalsSeason','histYear'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.innerHTML = opts; el.value = S.currentSeason || seasons()[0]; }
  });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  const render = {ranking:renderRanking, jogos:renderJogos, atletas:()=>renderAtletas(), confrontos:renderConfrontosPage, finals:renderFinals, historico:renderHistorico};
  if (render[name]) render[name]();
}

/* ═══════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════ */
function showModal(id) {
  if (id==='addResultModal') prepResultModal();
  if (id==='novaRodadaModal') prepRodadaModal();
  document.getElementById(id).style.display='flex';
}
function closeModal(id) { document.getElementById(id).style.display='none'; }
function outsideClose(e,id) { if (e.target.id===id) closeModal(id); }

/* ═══════════════════════════════════════════════
   ATLETA CRUD
═══════════════════════════════════════════════ */
function saveAtleta() {
  const nome = document.getElementById('aNome').value.trim();
  if (!nome) { alert('Nome obrigatório!'); return; }
  S.atletas.push({ id:uid(), nome, apelido:document.getElementById('aApelido').value.trim(),
    camiseta:document.getElementById('aCamiseta').value, foto:document.getElementById('aFoto').value.trim(),
    color:document.getElementById('aColor').value, createdAt:Date.now() });
  save(); closeModal('addAtletaModal');
  ['aNome','aApelido','aFoto'].forEach(i=>document.getElementById(i).value='');
  renderRanking(); renderAtletas();
}

let profileId = null;
function openEditFromProfile() {
  if (!profileId) return;
  const a = atletaById(profileId);
  if (!a) return;
  document.getElementById('editId').value = a.id;
  document.getElementById('editNome').value = a.nome;
  document.getElementById('editApelido').value = a.apelido||'';
  document.getElementById('editCamiseta').value = a.camiseta||'M';
  document.getElementById('editFoto').value = a.foto||'';
  document.getElementById('editColor').value = a.color||'ocean';
  closeModal('profileModal');
  showModal('editAtletaModal');
}
function updateAtleta() {
  const id = document.getElementById('editId').value;
  const a = S.atletas.find(x=>x.id===id); if (!a) return;
  const nome = document.getElementById('editNome').value.trim();
  if (!nome) { alert('Nome obrigatório!'); return; }
  a.nome=nome; a.apelido=document.getElementById('editApelido').value.trim();
  a.camiseta=document.getElementById('editCamiseta').value;
  a.foto=document.getElementById('editFoto').value.trim();
  a.color=document.getElementById('editColor').value;
  save(); closeModal('editAtletaModal'); renderAtletas(); renderRanking();
}
function deleteAtleta() {
  const id = document.getElementById('editId').value;
  const a = S.atletas.find(x=>x.id===id);
  if (!a) return;
  if (!confirm(`Excluir ${a.nome}? Todos os resultados serão mantidos.`)) return;
  S.atletas = S.atletas.filter(x=>x.id!==id);
  save(); closeModal('editAtletaModal'); renderAtletas(); renderRanking();
}

function showProfile(id) {
  profileId = id;
  const a = atletaById(id); if (!a) return;
  const cur = S.currentSeason;
  const st = (() => {
    const r = {pts:0,campeoes:0,vices:0,semis:0,presencas:0,jogos:0,vitorias:0,derrotas:0};
    S.resultados.filter(x=>x.season===cur&&x.atletaIds.includes(id)).forEach(x=>{
      r.pts+=PTS[x.tipo]||0;
      if(x.tipo==='campeao'){r.campeoes++;r.vitorias++;}
      else if(x.tipo==='vice'){r.vices++;r.derrotas++;}
      else if(x.tipo==='semi'){r.semis++;r.derrotas++;}
      else if(x.tipo==='presenca')r.presencas++;
      r.jogos++;
    }); return r;
  })();
  const all = (() => {
    const r = {campeoes:0,jogos:0};
    S.resultados.filter(x=>x.atletaIds.includes(id)).forEach(x=>{ if(x.tipo==='campeao')r.campeoes++; r.jogos++; }); return r;
  })();
  const wl = st.vitorias+st.derrotas > 0 ? Math.round(st.vitorias/(st.vitorias+st.derrotas)*100) : 0;
  document.getElementById('profileContent').innerHTML = `
    <div class="profile-hero">
      <div>${avatar(a,80,'border:3px solid var(--gold);flex-shrink:0;')}</div>
      <div style="flex:1;min-width:0;">
        <div class="profile-name">${a.nome}</div>
        ${a.apelido?`<div class="profile-nick">"${a.apelido}"</div>`:''}
        <div class="profile-meta">
          <div class="profile-meta-item">👕 <span>${a.camiseta||'M'}</span></div>
          <div class="profile-meta-item">🏆 <span>${all.campeoes} títulos totais</span></div>
          <div class="profile-meta-item">📅 <span>${all.jogos} participações</span></div>
        </div>
      </div>
      <div class="pts-badge" style="margin-left:auto;">
        <div class="pts-val">${st.pts}</div><div class="pts-lbl">pts ${cur}</div>
      </div>
    </div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.3);margin-bottom:10px;">Temporada ${cur}</div>
    <div class="grid-4">
      <div class="metric-card metric-gold"><div class="metric-lbl">Campeões</div><div class="metric-val">🥇 ${st.campeoes}</div></div>
      <div class="metric-card"><div class="metric-lbl">Vice</div><div class="metric-val" style="color:#C8D8E8;">🥈 ${st.vices}</div></div>
      <div class="metric-card"><div class="metric-lbl">Semi</div><div class="metric-val" style="color:#CD7F32;">🥉 ${st.semis}</div></div>
      <div class="metric-card metric-ocean"><div class="metric-lbl">Presenças</div><div class="metric-val">✅ ${st.presencas}</div></div>
    </div>
    <div style="margin-top:14px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:4px;">
        <span>🏆 Aproveitamento (finais)</span><span>${st.vitorias}/${st.vitorias+st.derrotas}</span>
      </div>
      <div class="wl-bar"><div class="wl-fill" style="width:${wl}%"></div></div>
    </div>`;
  showModal('profileModal');
}

/* ═══════════════════════════════════════════════
   RESULT CRUD
═══════════════════════════════════════════════ */
function prepResultModal() {
  const opts = S.atletas.map(a=>`<option value="${a.id}">${a.nome}${a.apelido?' ('+a.apelido+')':''}</option>`).join('');
  document.getElementById('rAtleta1').innerHTML = opts;
  document.getElementById('rAtleta2').innerHTML = '<option value="">— apenas 1 atleta —</option>'+opts;
  document.getElementById('rData').value = new Date().toISOString().split('T')[0];
}

function saveResult() {
  const a1 = document.getElementById('rAtleta1').value;
  if (!a1) { alert('Selecione o atleta!'); return; }
  const a2 = document.getElementById('rAtleta2').value;
  const tipo = document.getElementById('rTipo').value;
  const liga = document.getElementById('rLiga').value;
  const data = document.getElementById('rData').value;
  const season = (data||'').split('-')[0] || S.currentSeason;
  const ids = a2 && a2!==a1 ? [a1,a2] : [a1];
  S.resultados.push({ id:uid(), atletaIds:ids, tipo, liga, data, season, createdAt:Date.now() });
  save(); closeModal('addResultModal'); renderRanking();
}

function deleteResult(id) {
  if (!confirm('Remover este resultado?')) return;
  S.resultados = S.resultados.filter(r=>r.id!==id);
  save(); renderRanking();
}

/* ═══════════════════════════════════════════════
   RODADA CRUD
═══════════════════════════════════════════════ */
function prepRodadaModal() {
  document.getElementById('rodData').value = new Date().toISOString().split('T')[0];
  document.getElementById('rodPart').innerHTML = S.atletas.map(a=>`
    <label style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,.03);border-radius:6px;cursor:pointer;font-size:13px;">
      <input type="checkbox" value="${a.id}" style="accent-color:var(--gold);">
      ${a.apelido||a.nome.split(' ')[0]}
    </label>`).join('');
}

function saveRodada() {
  const data = document.getElementById('rodData').value;
  if (!data) { alert('Informe a data!'); return; }
  const isC = document.getElementById('rodChurrasco').value==='1';
  const part = [...document.querySelectorAll('#rodPart input:checked')].map(c=>c.value);
  if (part.length < 4) { alert('Mínimo 4 participantes!'); return; }
  const liga = document.getElementById('jogosLiga').value;
  const season = data.split('-')[0];

  // shuffle
  const sh = [...part].sort(()=>Math.random()-.5);
  const duplas = [];
  for (let i=0;i<sh.length;i+=2) {
    if (i+1<sh.length) duplas.push({id:uid(),atletas:[sh[i],sh[i+1]]});
    else duplas.push({id:uid(),atletas:[sh[i]]});
  }
  S.rodadas.push({id:uid(),data,season,liga:String(liga),isChurrasco:isC,participantes:part,duplas,createdAt:Date.now()});
  save(); closeModal('novaRodadaModal'); renderJogos();
}

function deleteRodada(id) {
  if (!confirm('Excluir esta rodada?')) return;
  S.rodadas = S.rodadas.filter(r=>r.id!==id);
  save(); renderJogos();
}

/* ═══════════════════════════════════════════════
   RENDER: RANKING
═══════════════════════════════════════════════ */
function updateSeason() {
  S.currentSeason = document.getElementById('seasonSelect').value; save(); renderRanking();
}

function renderRanking() {
  fillSeasonSelects();
  const season = S.currentSeason;
  const rank = ranking(season);

  // metrics
  const tc = rank.reduce((s,r)=>s+r.campeoes,0);
  document.getElementById('rankingMetrics').innerHTML = `
    <div class="metric-card metric-ocean"><div class="metric-lbl">Atletas</div><div class="metric-val">${S.atletas.length}</div><div class="metric-sub">cadastrados</div></div>
    <div class="metric-card metric-gold"><div class="metric-lbl">Campeões ${season}</div><div class="metric-val">${tc}</div><div class="metric-sub">títulos</div></div>
    <div class="metric-card metric-green"><div class="metric-lbl">Rodadas</div><div class="metric-val">${S.rodadas.filter(r=>r.season===season).length}</div><div class="metric-sub">em ${season}</div></div>
    <div class="metric-card"><div class="metric-lbl">Resultados</div><div class="metric-val" style="color:#C8D8E8;">${S.resultados.filter(r=>r.season===season).length}</div><div class="metric-sub">registrados</div></div>`;

  // ranking list
  const active = rank.filter(r=>r.jogos>0||r.pts>0);
  const BORDERS = ['gold-border','silver-border','bronze-border'];
  document.getElementById('rankingList').innerHTML = active.length===0
    ? `<div class="empty-state"><div class="empty-icon">🎾</div><div class="empty-text">Sem resultados em ${season}.<br>Registre um resultado para iniciar o ranking!</div></div>`
    : active.map((r,i)=>`
      <div class="rank-card ${BORDERS[i]||''}" onclick="showProfile('${r.a.id}')">
        <div class="rank-pos ${i<3?'pos-'+(i+1):'pos-other'}">${i+1}</div>
        ${avatar(r.a,42)}
        <div class="rank-info">
          <div class="rank-name">${r.a.nome}</div>
          <div class="rank-nick">${r.a.apelido?'"'+r.a.apelido+'"':'&nbsp;'}</div>
        </div>
        <div class="rank-stats">
          <div class="stat-item"><div class="stat-val" style="color:var(--gold-light);">${r.campeoes}</div><div class="stat-lbl">🥇</div></div>
          <div class="stat-item"><div class="stat-val" style="color:#C8D8E8;">${r.vices}</div><div class="stat-lbl">🥈</div></div>
          <div class="stat-item"><div class="stat-val" style="color:#CD7F32;">${r.semis}</div><div class="stat-lbl">🥉</div></div>
          <div class="stat-item"><div class="stat-val" style="color:rgba(255,255,255,.5);">${r.presencas}</div><div class="stat-lbl">✅</div></div>
        </div>
        <div class="pts-badge"><div class="pts-val">${r.pts}</div><div class="pts-lbl">pts</div></div>
      </div>`).join('');

  // recent
  const TIPO_LBL = {campeao:'🥇 Campeão',vice:'🥈 Vice',semi:'🥉 Semi',presenca:'✅ Presença'};
  const LIGA_LBL = {'1':'Liga 1','2':'Liga 2','3':'Liga 3','churrasco':'🔥 Churrasco'};
  const LIGA_CLS = {'1':'liga-1','2':'liga-2','3':'liga-3','churrasco':'churrasco-badge'};
  const recent = [...S.resultados].filter(r=>r.season===season).sort((a,b)=>b.createdAt-a.createdAt).slice(0,10);
  document.getElementById('recentGames').innerHTML = recent.length===0
    ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhum resultado registrado</div></div>`
    : recent.map(r=>{
        const names = r.atletaIds.map(id=>{const a=atletaById(id);return a?(a.apelido||a.nome.split(' ')[0]):'?';}).join(' + ');
        return `<div class="match-row">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">${names}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.35);">${r.data||''}</div>
          </div>
          <span class="liga-badge ${LIGA_CLS[r.liga]||'liga-1'}">${LIGA_LBL[r.liga]||r.liga}</span>
          <span style="font-size:13px;">${TIPO_LBL[r.tipo]||r.tipo}</span>
          <button class="btn btn-danger btn-sm" onclick="deleteResult('${r.id}')" title="Remover">✕</button>
        </div>`;
      }).join('');
}

/* ═══════════════════════════════════════════════
   RENDER: JOGOS
═══════════════════════════════════════════════ */
function renderJogos() {
  const liga = document.getElementById('jogosLiga').value;
  const rodadas = S.rodadas.filter(r=>r.liga===String(liga)).sort((a,b)=>b.createdAt-a.createdAt);
  if (rodadas.length===0) {
    document.getElementById('jogosContent').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma rodada na Liga ${liga}.<br>Crie uma nova rodada!</div></div>`;
    return;
  }
  const FORMATS = n => {
    if (n<4) return '⚠️ Rachão (sem pontuação)';
    if (n===4) return '4 atletas · Todos vs Todos + Final';
    if (n===6) return '6 atletas · Todos vs Todos + Semi + Final';
    if (n>6)   return `${n} atletas · 2 grupos + Semi + Final`;
    return '';
  };
  document.getElementById('jogosContent').innerHTML = rodadas.map(rod=>{
    const np = rod.participantes ? rod.participantes.length : 0;
    const nd = rod.duplas ? rod.duplas.length : 0;
    const duplasHTML = (rod.duplas||[]).map((d,i)=>{
      const ns = d.atletas.map(id=>{const a=atletaById(id);return a?(a.apelido||a.nome.split(' ')[0]):'?';}).join(' / ');
      const grp = i < Math.ceil(nd/2) ? 'Grupo 1' : 'Grupo 2';
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:7px;margin-bottom:5px;">
        <span style="color:var(--gold-light);font-weight:700;width:20px;">${i+1}</span>
        <span style="font-size:13px;font-weight:600;">${ns}</span>
        ${nd>3?`<span class="tag" style="margin-left:auto;font-size:10px;">${grp}</span>`:''}
      </div>`;
    }).join('');
    return `<div class="card mb-16">
      <div class="flex-row between mb-8">
        <div style="display:flex;align-items:center;gap:10px;">
          ${rod.isChurrasco?'<span class="liga-badge churrasco-badge">🔥 Churrasco</span>':`<span class="liga-badge liga-${liga}">Liga ${liga}</span>`}
          <span style="font-size:15px;font-weight:700;">${rod.data}</span>
          <span class="tag">${np} atletas · ${nd} duplas</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:rgba(255,255,255,.3);">${FORMATS(np)}</span>
          <button class="btn btn-danger btn-sm" onclick="deleteRodada('${rod.id}')">🗑</button>
        </div>
      </div>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.3);margin-bottom:8px;">Duplas Sorteadas</div>
      ${duplasHTML}
      ${np>=8?`<div class="mt-8 flex-row">
        <button class="btn btn-outline btn-sm" onclick="prepAndShowResult('${liga}','${rod.data}')">📝 Registrar Resultados</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function prepAndShowResult(liga, data) {
  document.getElementById('rLiga').value = liga;
  document.getElementById('rData').value = data;
  prepResultModal();
  showModal('addResultModal');
}

/* ═══════════════════════════════════════════════
   RENDER: ATLETAS
═══════════════════════════════════════════════ */
function renderAtletas(q='') {
  const season = S.currentSeason;
  const rank = ranking(season);
  const posMap = {};
  rank.forEach((r,i)=>posMap[r.a.id]=i+1);
  let list = S.atletas;
  if (q) list = list.filter(a=>a.nome.toLowerCase().includes(q.toLowerCase())||(a.apelido||'').toLowerCase().includes(q.toLowerCase()));
  if (list.length===0) {
    document.getElementById('atletasList').innerHTML=`<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">Nenhum atleta encontrado.</div></div>`;
    return;
  }
  const BORDERS=['gold-border','silver-border','bronze-border'];
  document.getElementById('atletasList').innerHTML = `<div class="ranking-grid">`+list.map(a=>{
    const pos=posMap[a.id]||0;
    const st=rank.find(r=>r.a.id===a.id)||{pts:0,campeoes:0,jogos:0};
    const i=pos-1;
    return `<div class="rank-card ${BORDERS[i]||''}" onclick="showProfile('${a.id}')">
      <div class="rank-pos ${i<3&&pos>0?'pos-'+(i+1):'pos-other'}">${pos||'—'}</div>
      ${avatar(a,42)}
      <div class="rank-info">
        <div class="rank-name">${a.nome} ${a.apelido?`<span style="color:var(--gold-light);font-size:12px;">"${a.apelido}"</span>`:''}</div>
        <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;">
          <span class="tag">👕 ${a.camiseta||'M'}</span>
          <span class="tag">🥇 ${st.campeoes}</span>
          <span class="tag">${st.jogos} jogos</span>
        </div>
      </div>
      <div class="pts-badge"><div class="pts-val">${st.pts}</div><div class="pts-lbl">pts</div></div>
    </div>`;
  }).join('')+'</div>';
}

/* ═══════════════════════════════════════════════
   RENDER: CONFRONTOS
═══════════════════════════════════════════════ */
function renderConfrontosPage() {
  const opts = S.atletas.map(a=>`<option value="${a.id}">${a.nome}${a.apelido?' ('+a.apelido+')':''}</option>`).join('');
  ['confA','confB'].forEach(id=>{ const s=document.getElementById(id); const v=s.value; s.innerHTML=opts; if(v) s.value=v; });
  renderConfrontos();
}

function renderConfrontos() {
  const idA = document.getElementById('confA').value;
  const idB = document.getElementById('confB').value;
  const cont = document.getElementById('confrontoResult');
  if (!idA||!idB||idA===idB) {
    cont.innerHTML=`<div class="empty-state"><div class="empty-icon">⚔️</div><div class="empty-text">Selecione dois atletas diferentes</div></div>`; return;
  }
  const aA=atletaById(idA), aB=atletaById(idB);
  if (!aA||!aB) return;

  const TIPO_LBL = {campeao:'🥇 Campeão',vice:'🥈 Vice',semi:'🥉 Semi',presenca:'✅ Presença'};
  const byDate = {};
  S.resultados.forEach(r=>{ const k=r.data+'_'+r.liga+'_'+r.season; if(!byDate[k])byDate[k]=[]; byDate[k].push(r); });

  const datesA = new Set(S.resultados.filter(r=>r.atletaIds.includes(idA)).map(r=>r.data+'_'+r.liga+'_'+r.season));
  const datesB = new Set(S.resultados.filter(r=>r.atletaIds.includes(idB)).map(r=>r.data+'_'+r.liga+'_'+r.season));
  const common = [...datesA].filter(d=>datesB.has(d));

  let vA=0,vB=0,emp=0;
  const details = common.map(key=>{
    const rsA = (byDate[key]||[]).filter(r=>r.atletaIds.includes(idA));
    const rsB = (byDate[key]||[]).filter(r=>r.atletaIds.includes(idB));
    if (!rsA.length||!rsB.length) return null;
    const bA = rsA.reduce((b,r)=>PTS[r.tipo]>PTS[b.tipo]?r:b,rsA[0]);
    const bB = rsB.reduce((b,r)=>PTS[r.tipo]>PTS[b.tipo]?r:b,rsB[0]);
    let res='Empate'; let cls='badge-blue';
    if (PTS[bA.tipo]>PTS[bB.tipo]) { vA++; res=aA.nome+' ganhou'; cls='badge-green'; }
    else if (PTS[bB.tipo]>PTS[bA.tipo]) { vB++; res=aB.nome+' ganhou'; cls='badge-red'; }
    else emp++;
    return { date:key.split('_')[0], tipoA:bA.tipo, tipoB:bB.tipo, res, cls };
  }).filter(Boolean);

  const total=vA+vB+emp;
  cont.innerHTML=`
    <div class="card mb-16">
      <div class="confronto-vs">
        <div class="confronto-side" style="text-align:center;">
          ${avatar(aA,56,'border:2px solid var(--gold);')}
          <div style="font-size:15px;font-weight:700;margin-top:8px;">${aA.nome}</div>
          ${aA.apelido?`<div style="font-size:12px;color:var(--gold-light);">"${aA.apelido}"</div>`:''}
        </div>
        <div style="text-align:center;flex:1;">
          <div class="confronto-resultado">
            <span class="${vA>=vB?'result-win':'result-loss'}">${vA}</span>
            <span style="color:rgba(255,255,255,.2);"> × </span>
            <span class="${vB>=vA?'result-win':'result-loss'}">${vB}</span>
          </div>
          <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:4px;">${total} encontro(s)</div>
          ${emp>0?`<div style="font-size:11px;color:rgba(255,255,255,.25);">${emp} empate(s)</div>`:''}
        </div>
        <div class="confronto-side" style="text-align:center;">
          ${avatar(aB,56,'border:2px solid var(--gold);')}
          <div style="font-size:15px;font-weight:700;margin-top:8px;">${aB.nome}</div>
          ${aB.apelido?`<div style="font-size:12px;color:var(--gold-light);">"${aB.apelido}"</div>`:''}
        </div>
      </div>
    </div>
    ${total===0
      ?`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum encontro registrado entre esses atletas</div></div>`
      :`<div class="card"><div class="card-title">Histórico de Encontros</div>
        ${details.map(d=>`<div class="match-row">
          <div style="font-size:12px;color:rgba(255,255,255,.4);min-width:80px;">${d.date}</div>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:12px;font-size:13px;">
            <span>${TIPO_LBL[d.tipoA]||d.tipoA}</span>
            <span style="color:rgba(255,255,255,.2);">vs</span>
            <span>${TIPO_LBL[d.tipoB]||d.tipoB}</span>
          </div>
          <span class="badge ${d.cls}">${d.res}</span>
        </div>`).join('')}
      </div>`}`;
}

/* ═══════════════════════════════════════════════
   RENDER: FINALS
═══════════════════════════════════════════════ */
function renderFinals() {
  fillSeasonSelects();
  const season = document.getElementById('finalsSeason').value || S.currentSeason;
  const rank = ranking(season).filter(r=>r.pts>0||r.jogos>0);
  if (rank.length<4) {
    document.getElementById('finalsContent').innerHTML=`<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">Poucos atletas classificados para o Finals de ${season}.<br>Mínimo 4 atletas com pontuação.</div></div>`; return;
  }
  const ouro = rank.slice(0,8);
  const prata = rank.slice(8,16);
  function makePairs(lista) {
    const p=[];
    for(let i=0;i<lista.length;i+=2) if(i+1<lista.length) p.push({i,r1:lista[i],r2:lista[i+1]});
    return p;
  }
  function pairRow(p,cls,clsText) {
    return `<div class="match-row">
      <span class="badge ${cls}" style="min-width:22px;justify-content:center;">${p.i/2+1}</span>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          ${avatar(p.r1.a,28)} <div><div style="font-size:13px;font-weight:600;">${p.r1.a.nome}</div><div style="font-size:10px;${clsText}">#${rank.indexOf(p.r1)+1} · ${p.r1.pts} pts</div></div>
        </div>
        <div style="font-size:10px;color:rgba(255,255,255,.25);margin-left:36px;margin-bottom:4px;">+ DUPLA COM</div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${avatar(p.r2.a,28)} <div><div style="font-size:13px;font-weight:600;">${p.r2.a.nome}</div><div style="font-size:10px;${clsText}">#${rank.indexOf(p.r2)+1} · ${p.r2.pts} pts</div></div>
        </div>
      </div>
      <div class="badge ${cls}">Dupla ${p.i/2+1}</div>
    </div>`;
  }
  document.getElementById('finalsContent').innerHTML=`
    <div class="grid-2 mb-16">
      <div class="metric-card metric-gold"><div class="metric-lbl">Série Ouro</div><div class="metric-val">${ouro.length}</div><div class="metric-sub">atletas · #1 ao #${ouro.length}</div></div>
      <div class="metric-card"><div class="metric-lbl">Série Prata</div><div class="metric-val" style="color:#C8D8E8;">${prata.length}</div><div class="metric-sub">atletas · #9 ao #${8+prata.length}</div></div>
    </div>
    <div class="serie-card serie-ouro mb-16">
      <div class="serie-title serie-title-ouro">🥇 SÉRIE OURO</div>
      <div style="font-size:11px;color:rgba(212,160,23,.5);margin-bottom:12px;">1º+2º · 3º+4º · 5º+6º · 7º+8º · Semifinais + Final</div>
      ${makePairs(ouro).map(p=>pairRow(p,'badge-gold','color:var(--gold-light);')).join('')}
    </div>
    ${prata.length>=2?`
    <div class="serie-card serie-prata">
      <div class="serie-title serie-title-prata">🥈 SÉRIE PRATA</div>
      <div style="font-size:11px;color:rgba(138,155,176,.5);margin-bottom:12px;">9º+10º · 11º+12º · … · Semifinais + Final</div>
      ${makePairs(prata).map(p=>pairRow(p,'badge-silver','color:#C8D8E8;')).join('')}
    </div>`:''}`;
}

/* ═══════════════════════════════════════════════
   RENDER: HISTÓRICO
═══════════════════════════════════════════════ */
function renderHistorico() {
  fillSeasonSelects();
  const year = document.getElementById('histYear').value || seasons()[0];
  const LIGA_NAMES = {'1':'Liga 1 (Jan–Abr)','2':'Liga 2 (Mai–Ago)','3':'Liga 3 (Set–Dez)'};
  const LIGA_CLS2  = {'1':'liga-1','2':'liga-2','3':'liga-3'};
  const champsHTML = ['1','2','3'].map(l=>{
    const ch = S.resultados.filter(r=>r.season===year&&r.liga===l&&r.tipo==='campeao');
    if (!ch.length) return `<div class="champion-card" style="opacity:.4;">
      <div class="liga-badge ${LIGA_CLS2[l]}" style="margin-bottom:8px;">${LIGA_NAMES[l]}</div>
      <div style="font-size:14px;color:rgba(255,255,255,.3);margin-top:8px;">Sem campeão registrado</div>
    </div>`;
    const names = [...new Set(ch.flatMap(c=>c.atletaIds))].map(id=>{const a=atletaById(id);return a?a.nome:'?';}).join(' & ');
    return `<div class="champion-card">
      <div class="liga-badge ${LIGA_CLS2[l]}" style="margin-bottom:10px;">${LIGA_NAMES[l]}</div>
      <div style="font-size:28px;margin-bottom:8px;">🏆</div>
      <div style="font-size:16px;font-weight:800;color:var(--gold-light);">${names}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:4px;">Campeões da Liga</div>
    </div>`;
  }).join('');
  const rank = ranking(year).filter(r=>r.pts>0||r.jogos>0);
  const BORDERS=['gold-border','silver-border','bronze-border'];
  document.getElementById('historicoContent').innerHTML=`
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);margin-bottom:12px;">🏆 Campeões de ${year}</div>
    <div class="grid-3 mb-16">${champsHTML}</div>
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);margin-bottom:12px;">📊 Classificação Geral ${year}</div>
    ${rank.length===0
      ?`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Sem dados para ${year}</div></div>`
      :`<div class="ranking-grid">${rank.map((r,i)=>`
        <div class="rank-card ${BORDERS[i]||''}">
          <div class="rank-pos ${i<3?'pos-'+(i+1):'pos-other'}">${i+1}</div>
          ${avatar(r.a,36)}
          <div class="rank-info">
            <div class="rank-name" style="font-size:14px;">${r.a.nome}</div>
            ${r.a.apelido?`<div class="rank-nick">"${r.a.apelido}"</div>`:''}
          </div>
          <div class="rank-stats">
            <div class="stat-item"><div class="stat-val" style="color:var(--gold-light);font-size:14px;">${r.campeoes}</div><div class="stat-lbl">🥇</div></div>
            <div class="stat-item"><div class="stat-val" style="color:#C8D8E8;font-size:14px;">${r.vices}</div><div class="stat-lbl">🥈</div></div>
            <div class="stat-item"><div class="stat-val" style="font-size:14px;">${r.jogos}</div><div class="stat-lbl">jogos</div></div>
          </div>
          <div class="pts-badge"><div class="pts-val" style="font-size:15px;">${r.pts}</div><div class="pts-lbl">pts</div></div>
        </div>`).join('')}</div>`}`;
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
fillSeasonSelects();
renderRanking();
</script>
